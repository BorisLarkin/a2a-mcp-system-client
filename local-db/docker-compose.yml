version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mcp-client-postgres
    environment:
      POSTGRES_USER: mcp_client
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mcp_client_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - mcp-client-network

volumes:
  postgres_data:

networks:
  mcp-client-network:
    driver: bridge
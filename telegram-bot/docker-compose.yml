version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: dispatcher-telegram-bot
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_URL=${API_URL:-http://host.docker.internal:8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - redis  # опционально

  # Redis для очереди сообщений (опционально)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
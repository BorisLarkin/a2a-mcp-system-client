# ~/git/a2a-mcp-system-client/docker-compose.yml
version: '3.8'

services:
  # 1. Локальная база данных
  local-db:
    build: ./local-db
    container_name: mcp-client-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./local-db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./local-db/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      mcp-client-network:
        aliases:
          - postgres
          - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_client -d mcp_client_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 2. Redis для кеша и очередей
  redis:
    image: redis:7-alpine
    container_name: dispatcher-redis
    ports:
      - "6379:6379"
    env_file:
      - .env
    volumes:
      - redis_data:/data
      - ./scripts/redis-wrapper.sh:/redis-wrapper.sh  # Mount the wrapper
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      mcp-client-network:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # 3. Основной сервер local-proxy
  local-proxy:
    build: ./local-proxy
    container_name: local-proxy
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      local-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mcp-client-network
    restart: unless-stopped

  # 4. Телеграм бот
  telegram-bot:
    build: ./telegram-bot
    container_name: dispatcher-telegram-bot
    env_file:
      - .env
    depends_on:
      local-proxy:
        condition: service_started
      local-db:
        condition: service_healthy
    networks:
      - mcp-client-network
    restart: unless-stopped

  # 5. Веб-интерфейс (React)
  web-dashboard:
    build:
      context: ./web-dashboard/frontend
      dockerfile: Dockerfile
    container_name: dispatcher-web
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
      - REACT_APP_WS_URL=ws://localhost:8080
    depends_on:
      - local-proxy
    networks:
      - mcp-client-network
    restart: unless-stopped

networks:
  mcp-client-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  redis_data:
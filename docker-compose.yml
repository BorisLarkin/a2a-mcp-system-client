# docker-compose.yml
version: '3.8'

services:
  # 1. Локальная база данных
  local-db:
    build: ./local-db
    container_name: dispatcher-db
    environment:
      POSTGRES_DB: dispatcher_db
      POSTGRES_USER: dispatcher_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpass123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./local-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dispatcher-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatcher_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis для кеша и очередей
  redis:
    image: redis:7-alpine
    container_name: dispatcher-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123}
    volumes:
      - redis_data:/data
    networks:
      - dispatcher-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 3. Основной сервер local-proxy
  local-proxy:
    build: ./local-proxy
    container_name: dispatcher-proxy
    ports:
      - "8080:8080"
    environment:
      - DB_PASSWORD=${DB_PASSWORD:-localpass123}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispass123}
      - ORCHESTRATOR_URL=${ORCHESTRATOR_URL:-http://192.168.1.100:8081}
      - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-https://your-domain.com/api/v1/webhook/telegram}
    depends_on:
      local-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dispatcher-network
    volumes:
      - ./local-proxy/configs:/root/configs
    restart: unless-stopped

  # 4. Телеграм бот
  telegram-bot:
    build: ./telegram-bot
    container_name: dispatcher-telegram-bot
    environment:
      - BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_BASE_URL=http://local-proxy:8080
      - API_KEY=${TELEGRAM_API_KEY}
    depends_on:
      - local-proxy
    networks:
      - dispatcher-network
    restart: unless-stopped

  # 5. Веб-интерфейс (React)
  web-dashboard:
    build: ./web-dashboard
    container_name: dispatcher-web
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8080}
      - REACT_APP_WS_URL=${REACT_APP_WS_URL:-ws://localhost:8080}
    depends_on:
      - local-proxy
    networks:
      - dispatcher-network
    restart: unless-stopped

  # 6. Nginx для проксирования (опционально, если нужен HTTPS)
  nginx:
    image: nginx:alpine
    container_name: dispatcher-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./web-dashboard/build:/usr/share/nginx/html:ro
    depends_on:
      - local-proxy
      - web-dashboard
    networks:
      - dispatcher-network
    restart: unless-stopped

networks:
  dispatcher-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
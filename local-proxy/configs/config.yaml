# ./local-proxy/configs/config.yaml
server:
  port: "8080"
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "120s"

database:
  host: "172.28.0.2"
  port: 5432
  user: "mcp_client"
  password: "${DB_PASSWORD}"
  name: "mcp_client_db"
  ssl_mode: "disable"

redis:
  host: "localhost"
  port: 6379
  password: "${REDIS_PASSWORD}"
  db: 0

orchestrator:
  url: "${ORCHESTRATOR_URL}"  # http://192.168.1.100:8081 (компьютер А)
  api_key: "${ORCHESTRATOR_API_KEY}"
  timeout: "30s"

auth:
  jwt_secret: "${JWT_SECRET}"
  access_token_expiry: "24h"
  refresh_token_expiry: "720h"

telegram:
  webhook_url: "${TELEGRAM_WEBHOOK_URL}"

dispatcher:
  name: "Основная диспетчерская"
  auto_response_enabled: true
  default_channel: "telegram"
  work_hours_start: "09:00"
  work_hours_end: "18:00"
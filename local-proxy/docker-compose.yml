version: '3.8'

services:
  local-proxy:
    build: .
    container_name: mcp-local-proxy
    ports:
      - "8080:8080"
    environment:
      - CLOUD_API_URL=https://api.mcp-system.com
      - CLOUD_API_KEY=${CLOUD_API_KEY}
      - DB_URL=postgresql://mcp_client:${DB_PASSWORD}@postgres:5432/mcp_client_db
      - PORT=8080
      - SYNC_INTERVAL=5
      - ENABLE_OFFLINE=true
    depends_on:
      - postgres
    volumes:
      - ./config:/app/config
    restart: unless-stopped
    networks:
      - mcp-client-network

networks:
  mcp-client-network:
    external: true
    name: mcp-client-network